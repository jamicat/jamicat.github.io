<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guestbook</title>

<style>
@font-face{
  font-family:"Nunito";
  src:url("nunito.ttf") format("truetype");
}

body{
  font-family:"Nunito",sans-serif;
  background:
    radial-gradient(circle at top,#1b355d 0%,#0b1524 45%,#05080d 100%);
  color:white;
  padding:40px;
}

h2{
  font-weight:600;
  margin-bottom:30px;
  color:#ffffff;
}

h3{
  margin-top:40px;
  color:#78c7ff;
}

.section{
  max-width:700px;
}

.comment{
  margin-bottom:15px;
  padding:16px;
  border-radius:16px;

  background:rgba(73,132,201,0.10);

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  border:1px solid rgba(120,199,255,0.15);

  transition:0.2s;
}

.comment:hover{
  transform:translateY(-1px);
  border-color:rgba(255,170,72,0.35);
  box-shadow:0 0 18px rgba(255,170,72,0.12);
}

.name{
  font-weight:600;
  color:#ffffff;
}

.text{
  margin-top:4px;
  color:#b9deff;
  overflow-wrap:anywhere;
}

.time{
  font-size:12px;
  opacity:.7;
  color:#ffb15b;
}

button{
  margin-top:10px;
  margin-right:6px;
  padding:6px 14px;

  border-radius:8px;
  border:none;

  cursor:pointer;

  background:linear-gradient(135deg,#ffb15b,#ff8d3a);
  color:#08131f;

  font-family:"Nunito",sans-serif;
  font-weight:700;

  transition:.15s;
}

button:hover{
  transform:scale(1.04);
  box-shadow:0 0 16px rgba(255,160,70,.35);
}

textarea{
  background:rgba(255,255,255,.08);
  color:white;
}

textarea::placeholder{
  color:#9fb7d2;
}
</style>
</head>
<body>
<h2>Guestbook</h2>
<div class="section">
<h3>Pending</h3>
<div id="pending"></div>
<h3>Comments</h3>
<div id="approved"></div>

</div>
  
<script>
const API = "https://jamicat.ahrly.workers.dev";
const ADMIN_KEY = prompt("Enter password")

if(!ADMIN_KEY){
  document.body.innerHTML="Unauthorized"
  throw new Error("Unauthorized")
}

async function verify(){

  const res = await fetch(`${API}/api/pending?key=${ADMIN_KEY}`)

  if(res.status===403){
    document.body.innerHTML="Unauthorized"
    throw new Error("Unauthorized")
  }

  loadPending()
  loadApproved()
}

async function loadPending(){

  const res = await fetch(`${API}/api/pending?key=${ADMIN_KEY}`)
  const comments = await res.json()

  const container = document.getElementById("pending")
  container.innerHTML=""

  comments.forEach(c=>{

    const div=document.createElement("div")
    div.className="comment"

    div.innerHTML=`
      <div style="overflow-wrap:anywhere; word-break:break-word;" class="name">${c.name}</div>
      <div class="text">${c.comment}</div>
      <br><div class="time">${c.timestamp}</div>
      <button onclick="approve(${c.id})">Approve</button>
      <button onclick="deletePending(${c.id})">Delete</button>
    `

    container.appendChild(div)

  })
}

async function loadApproved(){

  const res = await fetch(`${API}/api/list`)
  const data = await res.json()

  const container=document.getElementById("approved")
  container.innerHTML=""

  data.comments.forEach(c=>{

    const div=document.createElement("div")
    div.className="comment"

    div.innerHTML=`
  <div style="overflow-wrap:anywhere; word-break:break-word;" class="name">${c.name}</div>

  <div class="text">${c.comment}</div>

 ${
  c.reply
    ? `
    <div style="margin-top:8px; border-top:1px dashed rgba(255,255,255,0.2); padding-top:6px; color:#b9deff; overflow-wrap:anywhere; word-break:break-word;">
      <strong>Jamie:</strong> ${c.reply}
      <br>
      <button onclick="deleteReply(${c.id})" style="margin-top:6px;">Delete Reply</button>
    </div>
    `
    : ''
}

  <br><div class="time">${c.timestamp}</div>

  <button onclick="toggleReplyBox(${c.id})">Reply</button>
  <button onclick="deleteApproved(${c.id})">Delete</button>

  <div id="replyBox-${c.id}" style="display:none; margin-top:10px;">
    <textarea id="replyInput-${c.id}"
      placeholder="Write reply..."
      style="width:100%; padding:8px; border-radius:8px; border:none; margin-bottom:6px;"
    >${c.reply || ""}</textarea>

    <button onclick="submitReply(${c.id})">Send</button>
  </div>
`

    container.appendChild(div)

  })
}

async function approve(id){

  await fetch(`${API}/api/approve/${id}?key=${ADMIN_KEY}`)
  loadPending()
  loadApproved()

}

async function deletePending(id){

 await fetch(`${API}/api/deletePending/${id}?key=${ADMIN_KEY}`)
  loadPending()

}

async function deleteApproved(id){

  await fetch(`${API}/api/delete/${id}?key=${ADMIN_KEY}`)
  loadApproved()

}

  function toggleReplyBox(id){
  const box = document.getElementById(`replyBox-${id}`)
  if(!box) return

  box.style.display = box.style.display === "none" ? "block" : "none"
}


async function deleteReply(id){

  if(!confirm("Delete this reply?")) return

  await fetch(`${API}/api/reply/${id}?key=${ADMIN_KEY}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ reply: "" }) // clears it
  })

  loadApproved()
}
  
async function submitReply(id){

  const input = document.getElementById(`replyInput-${id}`)
  if(!input) return

  const reply = input.value.trim()

  if(!reply){
    alert("Write something!")
    return
  }

  await fetch(`${API}/api/reply/${id}?key=${ADMIN_KEY}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ reply })
  })

  loadApproved()
}

verify()
</script>
</body>
</html>

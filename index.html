<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Jamie</title>

<link rel="stylesheet" href="stylish.css" />

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/lightgallery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/thumbnail/lg-thumbnail.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/zoom/lg-zoom.min.js"></script>

</head>

<body>

<!-- Galaxy Canvas -->

<canvas id="canvas"></canvas>

<!-- Background Video -->

<div id="bgndVideo">

    <div id="videoPoster"></div>

    <div id="background-video-iframe"></div>

</div>

<!-- Dark Overlay -->

<div class="video-overlay"></div>

<!-- Branding -->

<header class="site-header">

    <div class="branding">

        <img
            src="british-flag.gif"
            alt="Flag"
            class="brand-flag"
        />

        <h1 class="site-title">
            Jamie
        </h1>

        <div id="typed" class="site-subtitle"></div>

    </div>

</header>

<!-- Navigation -->

<nav class="site-nav">

    <button
        class="nav-link"
        onclick="openPanel('playlist')">
        playlist
    </button>

    <button
        class="nav-link"
        onclick="openPanel('art')">
        art
    </button>

    <button
        class="nav-link"
        onclick="openPanel('guestbook')">
        guestbook
    </button>

    <button
        id="themeToggle"
        class="nav-link">
        theme
    </button>

</nav>

<!-- Media Controls -->

<div class="player-controls">

    <button
        id="videoToggle"
        class="control-btn"
        aria-label="Play Pause">
        ▶
    </button>

    <button
        id="nextTrack"
        class="control-btn"
        aria-label="Next Track">
        ⏭
    </button>

    <button
        id="rewind10"
        class="control-btn"
        aria-label="Galaxy Toggle">
        ✦
    </button>

</div>

<!-- Theme Menu -->

<div id="themeMenu" class="theme-menu">

    <button data-theme="Default">
        cavetown
    </button>

    <button data-theme="Cat">
        cat
    </button>

    <button data-theme="Galaxy">
        galaxy
    </button>

</div>

<!-- Side Panel -->

<aside id="sidePanel">

    <div class="panel-header">

        <h2 id="panelTitle">
            Panel
        </h2>

        <button
            id="closePanelBtn"
            onclick="closePanel()">
            ×
        </button>

    </div>

    <div id="panelContent"></div>

</aside>

<!-- YouTube API -->

<script src="https://www.youtube.com/iframe_api"></script>

<!-- Existing Discord Script -->

<script src="discscripts.js"></script>

<!-- Main Site Logic -->

<script src="scripts.js"></script>

</body>
</html>

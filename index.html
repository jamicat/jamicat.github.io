<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="stylish.css"/>
<title>Jamie</title>
<canvas id="canvas"></canvas>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>  
<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/lightgallery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/thumbnail/lg-thumbnail.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/zoom/lg-zoom.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
plugins: [
function ({ addComponents }) {
addComponents({
'.terminal-button': {
 '@apply bg-red-300 font-medium text-sm text-white/90 px-3 py-1.5 mt-3 rounded-xl transition duration-300 ease-in-out hover:ring-1 hover:ring-teal-400 hover:bg-red-400 hover:bg-opacity-90 hover:scale-105 hover:text-white/100 active:scale-95 transform hover:-translate-y-[0.5px] hover:shadow-[0_0_2px_rgba(0,255,255,0.3)]': {},
cursor: 'pointer',
userSelect: 'none',
},
});
},
],
};
</script>
</head>
<body class="bg-black h-screen w-screen overflow-hidden">
<div id="bgndVideo">
<div id="videoPoster" class="absolute inset-0 bg-black z-0 bg-cover bg-center"></div>
<div id="background-video-iframe" style="opacity: 0; transition: opacity 0.5s;"></div>
</div>

<div id="terminal" class="terminal absolute p-6 max-w-full w-[90vw] sm:w-[480px] rounded-3xl" style="z-index: 10; top: 50%; left: 50%; transform: translate(-50%, -50%);">
<div class="drag-area text-pink-600 text-sm mb-2 select-none flex justify-between items-center">
<span class="flex items-center space-x-2">
<img src="gjo.gif" alt="Avatar" class="avatar-icon" />
<!--span id="typed3" class="text-pink-300 text-lg mt-4 mb-4"></span-->
  </span>
<div class="flex items-center space-x-2 mr-3 -mt-12">
<button id="videoToggle" class="text-red-300 hover:text-cyan-400 transition-colors duration-200 text-lg leading-none">
<svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current hidden" viewBox="0 0 24 24">
<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
</svg>
<svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current" viewBox="0 0 24 24">
<path d="M8 5v14l11-7z" />
</svg>
</button>
<button id="nextTrack" class="text-red-300 hover:text-cyan-400 transition-colors duration-200 text-lg leading-none">
<svg id="nextIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current" viewBox="0 0 24 24">
<path d="M7 6v12l8.5-6L7 6zm9 0h2v12h-2V6z"/>
</svg>
</button>
<div class="relative inline-block">
  <button id="changeTheme"
    class="text-red-300 hover:text-cyan-400 transition-colors duration-200 text-lg leading-none mt-3">
     <svg id="themeIcon" class="w-6 h-6 fill-current mt-3" viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg">
      <path d="M5.6 11.6l-1.2-1.2c-0.8-0.2-2-0.1-2.7 1-0.8 1.1-0.3 2.8-1.7 4.6 0 0 3.5 0 4.8-1.3 1.2-1.2 1.2-2.2 1-3l-0.2-0.1z"/>
      <path d="M5.8 8.1c-0.2 0.3-0.5 0.7-0.7 1 0 0.2-0.1 0.3-0.2 0.4l1.5 1.5c0.1-0.1 0.3-0.2 0.4-0.3 0.3-0.2 0.7-0.4 1-0.7 0.4 0 0.6-0.2 0.8-0.4l-2.2-2.2c-0.2 0.2-0.4 0.4-0.6 0.7z"/>
      <path d="M15.8 0.2c-0.3-0.3-0.7-0.3-1-0.1 0 0-3 2.5-5.9 5.1-0.4 0.4-0.7 0.7-1.1 1-0.2 0.2-0.4 0.4-0.6 0.5l2.1 2.1c0.2-0.2 0.4-0.4 0.5-0.7 0.3-0.4 0.6-0.7 0.9-1.1 2.5-3 5.1-5.9 5.1-5.9 0.3-0.2 0.3-0.6 0-0.9z"/>
    </svg>
  </button>
  <div id="tooltip"
    class="absolute left-1/2 top-full mt-2 -translate-x-1/2 rounded bg-black/10 text-sm text-white
    transition-all duration-300 py-2 px-3 flex flex-col gap-1 z-50 shadow-lg backdrop-blur-sm 
    border border-white/5 min-w-[8rem] opacity-0 pointer-events-none invisible">
    <button id="themeDefault" class="hover:bg-white/10 text-blue-glow rounded px-2 py-1 transition">Cavetown</button>
    <button id="themeStars" class="hover:bg-white/10 text-blue-glow rounded px-2 py-1 transition">Galaxy</button>
    <button id="themeAero" class="hover:bg-white/10 text-blue-glow rounded px-2 py-1 transition">Sky</button>
  </div>
</div>
<button id="rewind10" class="text-pink-100 -translate-x-[6px] transition-colors duration-200 text-lg leading-none">
<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 24 24"
class="w-6 h-6 fill-current"
>
<g>
<path d="M16.948 20.2a1 1 0 0 1-.465-.115l-4.472-2.352-4.471 2.348a1 1 0 0 1-1.451-1.054l.854-4.979-3.619-3.527a1 1 0 0 1 .554-1.706l5-.727 2.237-4.531A1 1 0 0 1 12.011 3a1 1 0 0 1 .9.558l2.236 4.53 5 .727a1 1 0 0 1 .554 1.706l-3.621 3.526.854 4.98a1 1 0 0 1-.986 1.173zM6.171 10.5l2.544 2.479a1 1 0 0 1 .285.888l-.6 3.5 3.144-1.653a.993.993 0 0 1 .931 0l3.144 1.653-.6-3.5a1 1 0 0 1 .288-.885l2.544-2.482-3.515-.511a1 1 0 0 1-.752-.547l-1.573-3.183-1.573 3.186a1 1 0 0 1-.752.547z"/>
</g>
</svg>
</button>
</div>
</div>

<div id="terminalContent">
<div class="font-medium text-pink-600 mt-5 mb-4 text-center" id="typed"></div>
<div id="buttonRow" class="flex justify-center space-x-4 flex-wrap sm:flex-nowrap">
<button class="terminal-button ml-2" onclick="showArt()">Art</button>
<button class="terminal-button ml-5" onclick="showGuestBook()">Guestbook</button>
<!--button class="terminal-button ml-3" onclick="showMessageForm()">Message</button-->
<button class="terminal-button" onclick="showList()">Playlist</button>
</div>
</div>
</div>
<script src="scripts.js"></script>
<script src="discscripts.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Playlist</title>

<style>
@font-face{
  font-family:"Nunito";
  src:url("nunito.ttf") format("truetype");
}

body{
  font-family:Nunito,sans-serif;
  background:
    radial-gradient(circle at top,#1b355d 0%,#0b1524 45%,#05080d 100%);
  color:white;
  padding:40px;
}

h2{
  margin-bottom:20px;
  color:#ffffff;
}

#list{
  max-width:700px;
}

.card{
  background:rgba(73,132,201,0.10);

  padding:12px;

  border-radius:14px;

  margin-bottom:10px;

  display:flex;
  flex-direction:column;
  gap:8px;

  overflow:hidden;
  box-sizing:border-box;

  border:1px solid rgba(120,199,255,.15);

  transition:.2s;
}

.card:hover{
  border-color:rgba(255,170,72,.35);
  box-shadow:0 0 18px rgba(255,170,72,.12);
}

.card input{
  width:100%;
  box-sizing:border-box;

  padding:8px;

  border-radius:8px;
  border:none;

  background:rgba(255,255,255,.08);
  color:white;

  outline:none;
}

.card input::placeholder{
  color:#9fb7d2;
}

.card input:focus{
  box-shadow:0 0 0 2px rgba(120,199,255,.35);
}

button{
  margin-top:6px;
  padding:8px 10px;

  border-radius:8px;
  border:none;

  cursor:pointer;

  background:linear-gradient(135deg,#ffb15b,#ff8d3a);
  color:#08131f;

  font-family:Nunito,sans-serif;
  font-weight:700;

  transition:.15s;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 16px rgba(255,160,70,.35);
}

.controls{
  margin-top:20px;
  display:flex;
  gap:10px;
}
</style>
</head>

<body>

<h2>Playlist</h2>

<div id="list"></div>

<div class="controls">
  <button onclick="addSong()">+ Add Song</button>
  <button onclick="save()">Save</button>
</div>

<script>
const API = "https://jamicat.ahrly.workers.dev";
const ADMIN_KEY = prompt("Enter password");

if (!ADMIN_KEY) {
  document.body.innerHTML = "Unauthorized";
  throw new Error("Unauthorized");
}

let playlist = [];

async function fetchMeta(videoId) {
  if (!videoId) return null;

  const res = await fetch(`${API}/api/youtube/meta?id=${videoId}`);

  if (!res.ok) return null;

  return await res.json();
}

async function load() {
  const res = await fetch(`${API}/api/playlist`);

  playlist = await res.json();

  render();
}

async function autoFill(i) {
  const videoId = playlist[i].videoId;

  const meta = await fetchMeta(videoId);

  if (!meta) return;

  playlist[i].title = meta.title;
  playlist[i].channelAvatar = meta.avatar;
  playlist[i].channelUrl = meta.channelUrl;

  render();
}

function render() {
  const el = document.getElementById("list");
  el.innerHTML = "";

  playlist.forEach((song, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <input value="${song.videoId || ''}" 
        onchange="playlist[${i}].videoId=this.value" 
        placeholder="videoId">

      <button onclick="autoFill(${i})">Auto-fill</button>

      <input value="${song.title || ''}" 
        onchange="playlist[${i}].title=this.value" 
        placeholder="title">

      <input value="${song.channelAvatar || ''}" 
        onchange="playlist[${i}].channelAvatar=this.value" 
        placeholder="avatar">

      <input value="${song.channelUrl || ''}" 
        onchange="playlist[${i}].channelUrl=this.value" 
        placeholder="channel url">

      <button onclick="remove(${i})">Remove</button>
    `;

    el.appendChild(div);
  });
}

function addSong() {
  playlist.push({
    videoId: "",
    title: "",
    channelAvatar: "",
    channelUrl: ""
  });
  render();
}

function remove(i) {
  playlist.splice(i, 1);
  render();
}

async function save() {
  const res = await fetch(`${API}/api/playlist/update?key=${ADMIN_KEY}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(playlist)
  });

  if (res.status === 403) {
    document.body.innerHTML = "Unauthorized";
    throw new Error("Unauthorized");
  }

  alert("Saved!");
}

load();
</script>
</body>
</html>

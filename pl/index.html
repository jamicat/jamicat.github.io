<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Playlist</title>

<style>
@font-face{
  font-family:"Nunito";
  src:url("nunito.ttf") format("truetype");
}

body{
  font-family:"Nunito",sans-serif;
  background:radial-gradient(circle at top,#1a1a1a,#000);
  color:white;
  padding:40px;
}

h2{
  font-weight:600;
  margin-bottom:30px;
}

.section{
  max-width:700px;
}

.card{
  margin-bottom:15px;
  padding:16px;
  border-radius:16px;
  background:rgba(255,182,206,0.08);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-1px);
}

input{
  width:100%;
  margin:6px 0;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(0,0,0,0.25);
  color:white;
  outline:none;
  font-family:"Nunito",sans-serif;
}

input:focus{
  border-color:#9be7ff;
}

input::placeholder{
  color:rgba(255,255,255,0.4);
}

button{
  margin-top:8px;
  margin-right:6px;
  padding:6px 14px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:#f3eaea;
  color:#000;
  font-family:"Nunito",sans-serif;
  font-weight:600;
  transition:0.15s;
}

button:hover{
  transform:scale(1.04);
}
</style>
</head>

<body>

<h2>Playlist Admin</h2>

<div id="list" class="section"></div>

<div style="margin-top:20px;">
  <button onclick="addSong()">+ Add Song</button>
  <button onclick="save()">Save</button>
</div>

<script>
const ADMIN_KEY = prompt("Enter password")

let playlist = []

async function load() {
  const res = await fetch('/api/playlist')
  playlist = await res.json()
  render()
}

function render() {
  const el = document.getElementById("list")
  el.innerHTML = ""

  playlist.forEach((song, i) => {
    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <input value="${song.videoId}" onchange="playlist[${i}].videoId=this.value" placeholder="videoId">
      <input value="${song.title}" onchange="playlist[${i}].title=this.value" placeholder="title">
      <input value="${song.channelAvatar}" onchange="playlist[${i}].channelAvatar=this.value" placeholder="avatar">
      <input value="${song.channelUrl}" onchange="playlist[${i}].channelUrl=this.value" placeholder="channel url">
      <button onclick="remove(${i})">Remove</button>
    `

    el.appendChild(div)
  })
}

function addSong() {
  playlist.push({
    videoId: "",
    title: "",
    channelAvatar: "",
    channelUrl: ""
  })
  render()
}

function remove(i) {
  playlist.splice(i, 1)
  render()
}

async function save() {
  await fetch(`/api/playlist/update?key=${ADMIN_KEY}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(playlist)
  })

  alert("Saved!")
}

load()
</script>

</body>
</html>

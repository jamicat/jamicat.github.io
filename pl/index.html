<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Playlist</title>

<style>
@font-face{
  font-family:"Nunito";
  src:url("nunito.ttf") format("truetype");
}

body {
  font-family: Nunito, sans-serif;
  background: #000;
  color: white;
  padding: 40px;
}

h2 {
  margin-bottom: 20px;
}

#list {
  max-width: 700px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;

  display: flex;
  flex-direction: column;
  gap: 8px;

  overflow: hidden;
  box-sizing: border-box;
}

.card input {
  width: 100%;
  box-sizing: border-box;

  padding: 8px;
  border-radius: 8px;
  border: none;

  background: rgba(255,255,255,0.08);
  color: white;

  outline: none;

  overflow-wrap: anywhere;
}

button {
  margin-top: 6px;
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #f3eaea;
  color: #000;
  font-family: Nunito, sans-serif;
  font-weight: 600;
  transition: 0.15s;
}

button:hover {
  transform: scale(1.03);
}

.controls {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}
</style>
</head>

<body>

<h2>Playlist</h2>

<div id="list"></div>

<div class="controls">
  <button onclick="addSong()">+ Add Song</button>
  <button onclick="save()">Save</button>
</div>

<script>
const ADMIN_KEY = prompt("Enter password");

if (!ADMIN_KEY) {
  document.body.innerHTML = "Unauthorized";
  throw new Error("Unauthorized");
}

let playlist = [];

async function verify() {
  const res = await fetch(`/api/playlist`);

  if (!res.ok) {
    document.body.innerHTML = "Unauthorized";
    throw new Error("Unauthorized");
  }

  await load();
}

async function load() {
  const res = await fetch('/api/playlist');

  if (!res.ok) {
    document.body.innerHTML = "Unauthorized";
    throw new Error("Unauthorized");
  }

  playlist = await res.json();
  render();
}

function render() {
  const el = document.getElementById("list");
  el.innerHTML = "";

  playlist.forEach((song, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <input value="${song.videoId || ''}" 
        onchange="playlist[${i}].videoId=this.value" 
        placeholder="videoId">

      <input value="${song.title || ''}" 
        onchange="playlist[${i}].title=this.value" 
        placeholder="title">

      <input value="${song.channelAvatar || ''}" 
        onchange="playlist[${i}].channelAvatar=this.value" 
        placeholder="avatar">

      <input value="${song.channelUrl || ''}" 
        onchange="playlist[${i}].channelUrl=this.value" 
        placeholder="channel url">

      <button onclick="remove(${i})">Remove</button>
    `;

    el.appendChild(div);
  });
}

function addSong() {
  playlist.push({
    videoId: "",
    title: "",
    channelAvatar: "",
    channelUrl: ""
  });
  render();
}

function remove(i) {
  playlist.splice(i, 1);
  render();
}

async function save() {
  const res = await fetch(`/api/playlist/update?key=${ADMIN_KEY}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(playlist)
  });

  if (res.status === 403) {
    document.body.innerHTML = "Unauthorized";
    throw new Error("Unauthorized");
  }

  alert("Saved!");
}

verify();
</script>

</body>
</html>

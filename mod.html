<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guestbook Moderation</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  margin:5px;
  padding:5px 10px;
  cursor:pointer;
}

.comment{
  margin-bottom:15px;
  padding:10px;
  border:1px solid #333;
  border-radius:6px;
}
</style>

</head>
<body>

<h2>Guestbook Moderation</h2>

<h3>Pending Comments</h3>
<div id="pending"></div>

<h3>Approved Comments</h3>
<div id="approved"></div>

<script>

const ADMIN_KEY = prompt("Enter admin password")

if(!ADMIN_KEY){
  document.body.innerHTML = "Unauthorized"
  throw new Error("Unauthorized")
}

async function loadPending(){

  const res = await fetch("/api/pending")
  const comments = await res.json()

  const container = document.getElementById("pending")
  container.innerHTML = ""

  comments.forEach(c => {

    const div = document.createElement("div")
    div.className = "comment"

    div.innerHTML = `
      <b>${c.name}</b><br>
      ${c.comment}<br>
      <small>${c.timestamp}</small><br>
      <button onclick="approve(${c.id})">Approve</button>
      <button onclick="deletePending(${c.id})">Delete</button>
    `

    container.appendChild(div)
  })
}

async function loadApproved(){

  const res = await fetch("/api/list")
  const data = await res.json()

  const container = document.getElementById("approved")
  container.innerHTML = ""

  data.comments.forEach(c => {

    const div = document.createElement("div")
    div.className = "comment"

    div.innerHTML = `
      <b>${c.name}</b><br>
      ${c.comment}<br>
      <small>${c.timestamp}</small><br>
      <button onclick="deleteApproved(${c.id})">Delete</button>
    `
    container.appendChild(div)
  })
}

async function approve(id){

  await fetch(`/api/approve/${id}?key=${ADMIN_KEY}`)

  loadPending()
  loadApproved()
}

async function deletePending(id){

  await fetch(`/api/deletePending/${id}?key=${ADMIN_KEY}`)
  loadPending()
}

async function deleteApproved(id){

  await fetch(`/api/delete/${id}?key=${ADMIN_KEY}`)

  loadApproved()
}

loadPending()
loadApproved()

</script>
</body>
</html>

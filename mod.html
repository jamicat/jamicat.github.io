<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guestbook Moderation</title>

<style>
@font-face{
  font-family:"Nunito";
  src:url("nunito.ttf") format("truetype");
}

body{
  font-family:"Nunito",sans-serif;
  background:radial-gradient(circle at top,#1a1a1a,#000);
  color:white;
  padding:40px;
}

h2{
  font-weight:600;
  margin-bottom:30px;
}

h3{
  margin-top:40px;
  color:#9be7ff;
}

.section{
  max-width:700px;
}

.comment{
  margin-bottom:15px;
  padding:16px;
  border-radius:16px;
  background:rgba(255,182,206,0.08);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
  transition:0.2s;
}

.comment:hover{
  transform:translateY(-1px);
}

.name{
  font-weight:600;
  color:#ffffff;
}

.text{
  margin-top:4px;
  color:#ffd6e5;
}

.time{
  font-size:12px;
  opacity:0.7;
}

button{
  margin-top:10px;
  margin-right:6px;
  padding:6px 14px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  background:#f3eaea;
  color:#000;
  font-family:"Nunito",sans-serif;
  font-weight:600;
  transition:0.15s;
}

button:hover{
  transform:scale(1.04);
}
</style>
</head>

<body>
<h2>Guestbook Moderation</h2>
<div class="section">
<h3>Pending Comments</h3>
<div id="pending"></div>
<h3>Approved Comments</h3>
<div id="approved"></div>
</div>

<script>
const ADMIN_KEY = prompt("Enter admin password")

if(!ADMIN_KEY){
  document.body.innerHTML = "Unauthorized"
  throw new Error("Unauthorized")
}

async function loadPending(){

  const res = await fetch("/api/pending")
  const comments = await res.json()

  const container = document.getElementById("pending")
  container.innerHTML = ""

  comments.forEach(c => {

    const div = document.createElement("div")
    div.className = "comment"

    div.innerHTML = `
      <div class="name">${c.name}</div>
      <div class="text">${c.comment}</div>
      <div class="time">${c.timestamp}</div>
      <button onclick="approve(${c.id})">Approve</button>
      <button onclick="deletePending(${c.id})">Delete</button>
    `

    container.appendChild(div)
  })
}

async function loadApproved(){

  const res = await fetch("/api/list")
  const data = await res.json()

  const container = document.getElementById("approved")
  container.innerHTML = ""

  data.comments.forEach(c => {

    const div = document.createElement("div")
    div.className = "comment"

    div.innerHTML = `
      <div class="name">${c.name}</div>
      <div class="text">${c.comment}</div>
      <div class="time">${c.timestamp}</div>
      <button onclick="deleteApproved(${c.id})">Delete</button>
    `

    container.appendChild(div)
  })
}

async function approve(id){
  await fetch(`/api/approve/${id}?key=${ADMIN_KEY}`)
  loadPending()
  loadApproved()
}

async function deletePending(id){
  await fetch(`/api/deletePending/${id}?key=${ADMIN_KEY}`)
  loadPending()
}

async function deleteApproved(id){
  await fetch(`/api/delete/${id}?key=${ADMIN_KEY}`)
  loadApproved()
}

loadPending()
loadApproved()
</script>
</body>
</html>
